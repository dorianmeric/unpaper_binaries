name: Windows Build
on:
  push:
    branches: [main]
    tags: ["*"]

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: bash --login -eo pipefail "{0}"

    strategy:
      matrix:
        mingw: ["MINGW32", "MINGW64"]
        include:
          - mingw: "MINGW32"
            arch: "i686"
          - mingw: "MINGW64"
            arch: "x86_64"

    env:
      MSYSTEM: ${{ matrix.mingw }}
      CHERE_INVOKING: 1
      LIBAV_PATH: ${{ github.workspace }}/../libav-11.8

    name: Build (${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4
      - name: Set up shell
        shell: pwsh
        run: |
          echo "C:\msys64\usr\bin\"  | Out-File -FilePath $Env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cache pacman packages
        uses: actions/cache@v4
        with:
          key: pacman-cache-${{ matrix.arch }}
          path: C:\msys64\var\cache\pacman\pkg

      - name: Install dependencies
        run: >
          pacman -S --noconfirm --needed zip base-devel mingw-w64-${{ matrix.arch }}-toolchain diffutils
          pkg-config mingw-w64-${{ matrix.arch }}-yasm mingw-w64-${{ matrix.arch }}-gcc mingw-w64-${{ matrix.arch }}-SDL

      - name: Cache libav
        id: cache-libav
        uses: actions/cache@v4
        with:
          path: ${{ env.LIBAV_PATH }}
          key: libav-11.8-${{ matrix.arch }}

      - name: Configure libav
        if: steps.cache-libav.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}/..
        run: |
          wget -O libav-11.8.tar.gz https://codeload.github.com/libav/libav/tar.gz/refs/tags/v11.8
          LIBAV_SRC_DIR="$(tar -tzf libav-11.8.tar.gz | head -1 | cut -d/ -f1)"
          tar -xvf libav-11.8.tar.gz
          rm -rf "${LIBAV_PATH}"
          mv "${LIBAV_SRC_DIR}" "${LIBAV_PATH}"
          cd ${LIBAV_PATH}
          ./configure --target-os=mingw32 --prefix=${MINGW_PREFIX}

      - name: Build libav
        if: steps.cache-libav.outputs.cache-hit != 'true'
        working-directory: ${{ env.LIBAV_PATH }}
        run: |
          make -r

      - name: Install libav
        working-directory: ${{ env.LIBAV_PATH }}
        run: |
          make install

      - name: Build Unpaper
        run: |
          autoreconf -fi
          mkdir exe
          ./configure --prefix=${PWD}/exe
          make -r
          make install
          cp ${MINGW_PREFIX}/bin/LIBBZ2-1.DLL exe/bin
          cp ${MINGW_PREFIX}/bin/LIBWINPTHREAD-1.DLL exe/bin
          cp ${MINGW_PREFIX}/bin/ZLIB1.DLL exe/bin

      # COMMIT:
      - name: Upload a Build Artifact
        if: startsWith(github.ref, 'refs/heads/')
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: unpaper-${{ github.ref_name }}-${{ github.sha }}-windows-${{ matrix.arch }}
          path: exe/bin/*

      # TAG:
      - name: Zip files and create checksum
        if: startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        run: |
          FILENAME=${{ github.ref_name }}-windows-${{ matrix.arch }}
          ( cd exe/bin && zip -r ../../${FILENAME}.zip . )
          sha256sum ${FILENAME}.zip > ${FILENAME}.sha256

      - name: Create release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ github.ref_name }}-windows-${{ matrix.arch }}.zip
            ${{ github.ref_name }}-windows-${{ matrix.arch }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
